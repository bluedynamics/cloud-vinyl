---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-vinyl-bluedynamics-eu-v1alpha1-vinylcache
  failurePolicy: Fail
  name: mvinylcache-v1alpha1.kb.io
  rules:
  - apiGroups:
    - vinyl.bluedynamics.eu
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - vinylcaches
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-vinyl-bluedynamics-eu-v1alpha1-vinylcache
  failurePolicy: Fail
  name: vvinylcache-v1alpha1.kb.io
  rules:
  - apiGroups:
    - vinyl.bluedynamics.eu
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - vinylcaches
  sideEffects: None
