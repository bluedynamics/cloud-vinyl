---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - vinyl.bluedynamics.eu
  resources:
  - vinylcaches
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - vinyl.bluedynamics.eu
  resources:
  - vinylcaches/finalizers
  verbs:
  - update
- apiGroups:
  - vinyl.bluedynamics.eu
  resources:
  - vinylcaches/status
  verbs:
  - get
  - patch
  - update
