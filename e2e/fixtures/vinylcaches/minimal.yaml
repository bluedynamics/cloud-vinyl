apiVersion: vinyl.bluedynamics.eu/v1alpha1
kind: VinylCache
metadata:
  name: my-cache
spec:
  replicas: 1
  image: varnish:7.6
  backends:
    - name: echo
      serviceRef:
        name: echo-backend
      port: 80
      probe:
        url: /
        interval: 5s
        timeout: 1s
        threshold: 2
        window: 5
