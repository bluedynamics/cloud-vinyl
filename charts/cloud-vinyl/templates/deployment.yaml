apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloud-vinyl.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloud-vinyl.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cloud-vinyl.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cloud-vinyl.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cloud-vinyl.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: {{ include "cloud-vinyl.operatorImage" . }}
          imagePullPolicy: {{ .Values.image.operator.pullPolicy }}
          args:
            - --health-probe-bind-address={{ .Values.operatorFlags.probeAddr }}
            - --metrics-bind-address={{ .Values.operatorFlags.metricsAddr }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect=true
            {{- end }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: VARNISH_IMAGE
              value: "{{ .Values.image.varnish.repository }}:{{ .Values.image.varnish.tag }}"
            - name: AGENT_IMAGE
              value: "{{ .Values.image.varnish.repository }}:{{ .Values.image.varnish.tag }}"
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: webhook
              containerPort: 9443
              protocol: TCP
            - name: proxy
              containerPort: 8090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "cloud-vinyl.webhookTLSSecret" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
