apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloud-vinyl.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloud-vinyl.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "cloud-vinyl.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: proxy
      port: 8090
      targetPort: 8090
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloud-vinyl.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloud-vinyl.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "cloud-vinyl.selectorLabels" . | nindent 4 }}
  ports:
    - name: webhook
      port: 443
      targetPort: 9443
      protocol: TCP
