apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cloud-vinyl.fullname" . }}
  labels:
    {{- include "cloud-vinyl.labels" . | nindent 4 }}
rules:
  # VinylCache CRD
  - apiGroups: ["vinyl.bluedynamics.eu"]
    resources: ["vinylcaches"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["vinyl.bluedynamics.eu"]
    resources: ["vinylcaches/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["vinyl.bluedynamics.eu"]
    resources: ["vinylcaches/finalizers"]
    verbs: ["update"]

  # Kubernetes resources the operator manages
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/status", "services", "endpoints", "secrets", "serviceaccounts", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Leader-election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
