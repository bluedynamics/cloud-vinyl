name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  docker-build:
    needs: ci
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.operator
            image: ghcr.io/bluedynamics/cloud-vinyl-operator
            platform: linux/amd64
            runner: ubuntu-latest
          - dockerfile: Dockerfile.operator
            image: ghcr.io/bluedynamics/cloud-vinyl-operator
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - dockerfile: Dockerfile.agent
            image: ghcr.io/bluedynamics/cloud-vinyl-agent
            platform: linux/amd64
            runner: ubuntu-latest
          - dockerfile: Dockerfile.agent
            image: ghcr.io/bluedynamics/cloud-vinyl-agent
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PLATFORM_TAG="${{ matrix.platform }}"
          PLATFORM_TAG="${PLATFORM_TAG//\//-}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "platform_tag=${PLATFORM_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push per-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          tags: ${{ matrix.image }}:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.platform_tag }}

  docker-manifest:
    needs: docker-build
    strategy:
      matrix:
        include:
          - image: ghcr.io/bluedynamics/cloud-vinyl-operator
          - image: ghcr.io/bluedynamics/cloud-vinyl-agent
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          IMAGE="${{ matrix.image }}"
          docker manifest create "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-linux-amd64" \
            "${IMAGE}:${VERSION}-linux-arm64"
          docker manifest push "${IMAGE}:${VERSION}"
          docker manifest create "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-linux-amd64" \
            "${IMAGE}:${VERSION}-linux-arm64"
          docker manifest push "${IMAGE}:latest"

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm-chart:
    needs: docker-manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set chart version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" charts/cloud-vinyl/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/cloud-vinyl/Chart.yaml

      - uses: azure/setup-helm@v5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push chart
        run: |
          helm package charts/cloud-vinyl
          helm push cloud-vinyl-*.tgz oci://ghcr.io/bluedynamics/charts
